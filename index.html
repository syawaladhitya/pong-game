<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Pong Game</h1>
        <div class="scoreboard">
            <div class="score">
                <span class="label">Player</span>
                <span class="score-value" id="playerScore">0</span>
            </div>
            <div class="score">
                <span class="label">Computer</span>
                <span class="score-value" id="computerScore">0</span>
            </div>
        </div>
        <canvas id="pongCanvas" width="800" height="400"></canvas>
        <div class="instructions">
            <p><strong>Controls:</strong> Move mouse up/down or use Arrow Keys to control left paddle</p>
            <p><strong>Objective:</strong> Hit the ball past the computer opponent</p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
